spring.application.name=api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/Certiva_db
spring.datasource.username=postgres
spring.datasource.password= Admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Por defecto Spring Boot mapea camelCase → snake_case; @Table(name=...) fija el nombre de tabla.

# JWT Configuration
jwt.secret=Q2VydGl2YVNlY3VyaXR5S2V5MjAyNlN1cGVyU2VjcmV0S2V5Rm9ySldUU2lnbmluZw==
jwt.expiration=86400000

# Archivos de eventos
certiva.upload.dir=uploads
certiva.frontend.base-url=http://localhost:4200
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
