<aside class="mon-sidebar" [class.collapsed]="collapsed">
  <div class="mon-sidebar__head">
    <div class="mon-sidebar__logo">
      <span class="mon-sidebar__logo-mark">C</span>
      @if (!collapsed) {
        <span class="mon-sidebar__logo-text">Certiva</span>
      }
    </div>
    <button type="button" class="mon-sidebar__toggle" (click)="toggle()" aria-label="Menú">
      <i class="bi bi-list" aria-hidden="true"></i>
    </button>
  </div>

  <nav class="mon-sidebar__nav">
    <a routerLink="/monitor/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="mon-sidebar__link">
      <i class="bi bi-grid-1x2 mon-sidebar__icon" aria-hidden="true"></i>
      @if (!collapsed) { <span>Panel</span> }
    </a>
    <a routerLink="/monitor/hoy" routerLinkActive="active" class="mon-sidebar__link">
      <i class="bi bi-calendar-event mon-sidebar__icon" aria-hidden="true"></i>
      @if (!collapsed) { <span>Hoy</span> }
    </a>
    <a routerLink="/admin/check-in" routerLinkActive="active" class="mon-sidebar__link">
      <i class="bi bi-qr-code-scan mon-sidebar__icon" aria-hidden="true"></i>
      @if (!collapsed) { <span>Check-in QR</span> }
    </a>
    <a routerLink="/monitor/reportes" routerLinkActive="active" class="mon-sidebar__link">
      <i class="bi bi-bar-chart-line mon-sidebar__icon" aria-hidden="true"></i>
      @if (!collapsed) { <span>Reportes</span> }
    </a>
  </nav>

  <div class="mon-sidebar__foot">
    @if (usuario && !collapsed) {
      <div class="mon-sidebar__user">
        <div class="mon-sidebar__avatar">{{ usuario.nombres.charAt(0) }}{{ usuario.apellidos.charAt(0) }}</div>
        <div>
          <span class="mon-sidebar__user-name">{{ usuario.nombres }}</span>
          <span class="mon-sidebar__user-role">Monitor</span>
        </div>
      </div>
    }
    <button type="button" class="mon-sidebar__logout" (click)="logout()" title="Cerrar sesión" aria-label="Cerrar sesión">
      <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
    </button>
  </div>
</aside>
