<div class="card glass-card border-0 h-100 mb-0">
  <div class="card-body p-4 d-flex align-items-center gap-3">
    <div class="stat-icon" [ngClass]="icon">
      @switch (icon) {
        @case ('users') {
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
          </svg>
        }
        @case ('calendar') {
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        }
        @case ('clipboard') {
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        }
        @case ('award') {
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="7" />
            <path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12" />
          </svg>
        }
      }
    </div>
    <div class="flex-grow-1 min-w-0">
      <div class="kpi-value" [ngClass]="'tone-' + valueTone">{{ value ?? 0 }}</div>
      <div class="kpi-label text-secondary small">{{ label }}</div>
      @if (trendLine) {
        <div class="kpi-trend small mt-1">{{ trendLine }}</div>
      }
    </div>
  </div>
</div>
